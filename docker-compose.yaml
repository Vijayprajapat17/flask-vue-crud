version: '3.8'

services:

  backend:
    build:
      context: ./server
    container_name: flask-backend
    ports:
      - "5173:5173"
    restart: always

  frontend:
    build:
      context: ./client
    container_name: vue-frontend
    ports:
      - "5001:5001"
    depends_on:
      - backend
    restart: always
